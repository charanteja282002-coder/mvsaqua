<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Login – MVS AQUA</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#023E8A 0%,#0077B6 50%,#00B4D8 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:24px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,.25);width:100%;max-width:390px}
.brand{font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;color:#023E8A;text-align:center}
.sub{text-align:center;color:#64748B;font-size:.82rem;margin:4px 0 26px}
label{font-size:.78rem;font-weight:800;display:block;margin-bottom:5px;color:#0D1B2A;text-transform:uppercase;letter-spacing:.5px}
input{width:100%;padding:12px 15px;border:2px solid #DBF0FF;border-radius:11px;font-family:'Nunito',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;margin-bottom:14px}
input:focus{border-color:#00B4D8}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#0077B6,#023E8A);color:#fff;border:none;border-radius:11px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;transition:all .2s;margin-top:4px}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,119,182,.4)}
.error{background:#FFF3E0;border:1px solid #FFE0B2;border-radius:10px;padding:11px 14px;color:#E65100;font-size:.82rem;font-weight:700;margin-bottom:14px}
.back{display:block;text-align:center;margin-top:16px;color:#64748B;font-size:.82rem;text-decoration:none}
.back:hover{color:#0077B6}
</style></head>
<body><div class="card">
  <div class="brand">🐠 MVS AQUA</div>
  <div class="sub">Admin Dashboard Login</div>
  {% for m in messages %}<div class="error">{{ m }}</div>{% endfor %}
  <form method="post">{% csrf_token %}
    <label>Username</label><input type="text" name="username" placeholder="admin" required autofocus>
    <label>Password</label><input type="password" name="password" placeholder="••••••••" required>
    <button type="submit" class="btn">Login to Dashboard</button>
  </form>
  <a href="/" class="back">← Back to Store</a>
</div></body></html>
